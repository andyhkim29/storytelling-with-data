  <defs>
    <style>
      text { font-family: Avenir, Helvetica, sans-serif; }
    </style>
  </defs>
  <rect width="800" height="600" fill="none"/>

  <!-- Street grid - simplified London streets -->
  <!-- Horizontal streets -->
  <line x1="80" y1="120" x2="720" y2="120" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="60" y1="240" x2="740" y2="240" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="80" y1="360" x2="720" y2="360" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="480" x2="700" y2="480" stroke="#424141" stroke-width="1.5" opacity="0.3"/>

  <!-- Vertical streets -->
  <line x1="160" y1="60" x2="160" y2="540" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="320" y1="60" x2="320" y2="540" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="480" y1="60" x2="480" y2="540" stroke="#424141" stroke-width="1.5" opacity="0.3"/>
  <line x1="640" y1="60" x2="640" y2="540" stroke="#424141" stroke-width="1.5" opacity="0.3"/>

  <!-- Diagonal street (Broad Street) -->
  <line x1="220" y1="80" x2="520" y2="520" stroke="#424141" stroke-width="2.5" opacity="0.4"/>

  <!-- Street labels -->
  <text x="280" y="108" font-size="10" fill="#424141" opacity="0.5" transform="rotate(-3,280,108)">Oxford St</text>
  <text x="245" y="228" font-size="10" fill="#424141" opacity="0.5" transform="rotate(-3,245,228)">Broad St</text>
  <text x="500" y="350" font-size="10" fill="#424141" opacity="0.5">Regent St</text>
  <text x="315" y="160" font-size="10" fill="#424141" opacity="0.5" transform="rotate(60,315,160)">Dean St</text>

